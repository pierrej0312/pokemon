version: '3.9'

services:
  db:
    image: postgres:15
    container_name: pokemon-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: pokemon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ../backend
    container_name: pokemon-backend
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/pokemon
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: example

  frontend:
    build: ../frontend
    container_name: pokemon-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data: