name: CI/CD Pokémon Game

on:
  push:
    branches:
      - develop
      - 'feature/**'
      - 'release/**'
  pull_request:
    branches:
      - develop
      - main

jobs:
  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '21'

      - name: Build Maven backend
        run: mvn -B clean install --file backend/pom.xml

      - name: Run backend tests
        run: mvn test --file backend/pom.xml

  build-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend lint
        run: |
          cd frontend
          npm run lint

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test -- --watch=false --browsers=ChromeHeadless

      - name: Build frontend
        run: |
          cd frontend
          npm run build -- --output-path=dist

  docker-build-deploy:
    name: Docker Build & Staging Deploy
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker images
        run: |
          docker build -t pokemon-backend ./backend
          docker build -t pokemon-frontend ./frontend

      - name: Push Docker images to registry (optional)
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag pokemon-backend yourdockerhub/pokemon-backend:latest
          docker tag pokemon-frontend yourdockerhub/pokemon-frontend:latest
          docker push yourdockerhub/pokemon-backend:latest
          docker push yourdockerhub/pokemon-frontend:latest

      - name: Deploy to staging server (optional)
        run: |
          ssh user@staging-server "docker pull yourdockerhub/pokemon-backend:latest && docker pull yourdockerhub/pokemon-frontend:latest && docker-compose -f /path/to/docker-compose.yml up -d"