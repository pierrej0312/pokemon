name: CI/CD Pokémon Game Local

on:
  push:
    branches:
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - develop
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '21'
      - name: Resolve Maven plugins
        run: mvn dependency:resolve-plugins --file backend/pom.xml
      - name: Build & Run tests with coverage
        run: mvn clean verify jacoco:report --file backend/pom.xml
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/jacoco.xml

  build-frontend:
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: |
          cd frontend
          npm ci
      - run: |
          cd frontend
          npm run lint
      - run: |
          cd frontend
          npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
      - run: |
          cd frontend
          npm run build -- --output-path=dist

  docker-build-local:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v3
      - run: docker build -t pokemon-backend ./backend
      - run: docker build -t pokemon-frontend ./frontend
      # Déploiement distant commenté pour l'instant
      #- run: |
      #    ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
      #    "cd /path/to/pokemon && docker-compose pull && docker-compose up -d"